[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --strict-markers --tb=short

markers =
    unit: Unit tests (pure functions, no external dependencies)
    integration: Integration tests (components with real dependencies like DB, API)
    e2e: End-to-end tests (full user workflows)
    slow: Tests taking > 5 seconds
    checklist_item: Mark test as covering specific checklist item

# Coverage settings (optional, uncomment if using pytest-cov)
# addopts = -v --strict-markers --tb=short --cov=app --cov-report=term-missing

# Test discovery
pythonpath = .

# Ignore patterns
norecursedirs = .git .tox build dist *.egg __pycache__ .pytest_cache

# Timeout settings (optional, requires pytest-timeout)
# timeout = 300
